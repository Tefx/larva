  - id: core_logic.normalize-capabilities
    name: normalize-capabilities
    status: done
    description: 'Update normalization logic to convert `tools` → `capabilities` and
      handle both fields.


      ## File: src/larva/core/normalize.py


      ### Changes Required

      1. When normalizing a spec: if `tools` is present and `capabilities` is not,
      copy `tools` to `capabilities`

      2. If both `tools` and `capabilities` are present, `capabilities` takes precedence

      3. Output MUST always contain `capabilities`; during transition, also output
      `tools` (mirror of capabilities) for backward compat

      4. Update `@pre`/`@post` contracts and doctests BEFORE implementation (per CLAUDE.md
      invar rules)


      ### spec_digest behavior (EXPLICIT DECISION REQUIRED)

      Adding `capabilities` to normalized output changes the canonical JSON representation.
      This affects `spec_digest`:

      - Existing registered specs in `~/.larva/registry/*.json` have digests computed
      WITHOUT `capabilities`

      - Re-normalizing them will add `capabilities` → different digest

      - **Decision**: Accept that digests will change for re-normalized specs. This
      is an acceptable migration cost. Document this in the docstring: "Note: Adding
      capabilities field changes spec_digest for previously registered specs."

      - Alternatively: if digest stability is critical, normalize should strip `capabilities`
      from digest computation during transition. Document whichever approach is chosen.


      ### Acceptance Criteria

      - `tools`-only specs get `capabilities` added via normalization

      - `capabilities`-only specs work correctly

      - Both-fields specs use `capabilities` (tools mirrored for backward compat)

      - spec_digest behavior is explicitly documented

      - `uv run invar guard --all` passes'
    verification: '- normalize_spec with `tools` input produces `capabilities` in
      output

      - normalize_spec with `capabilities` input works correctly

      - Both fields present in output during transition

      - Existing doctests pass

      - `uv run invar guard --all` passes'
