    name: facade-export
    status: done
    description: 'Add `export_all()` and `export_ids(ids)` to LarvaFacade protocol
      and DefaultLarvaFacade.


      File: src/larva/app/facade.py


      This is a non-simple feature path: it adds new facade contracts consumed by
      MCP, CLI, Python API, and plugin export flows, so it MUST follow the upstream
      contract -> facade-tests -> implementation order.


      ## LarvaFacade Protocol

      Add two method signatures:

      ```python

      def export_all(self) -> Result[list[PersonaSpec], LarvaError]: ...

      def export_ids(self, ids: list[str]) -> Result[list[PersonaSpec], LarvaError]:
      ...

      ```


      ## DefaultLarvaFacade Implementation


      ### export_all()

      Flow: `self._registry.list()` -> on success, return the full `list[PersonaSpec]`
      directly.

      Registry `list()` already returns complete specs. No validate/normalize needed
      (registry data is already validated+normalized).

      Empty registry returns `Success([])`.

      Error mapping: registry list failure -> pass-through error (same pattern as
      `list()` method at lines 407-426).


      ### export_ids(ids)

      Flow: for each id in ids, call `self._registry.get(id)`. Fail-fast on first
      error.

      Collect successful specs into a list and return `Success(specs)`.

      Error mapping: registry get failure -> pass-through (PERSONA_NOT_FOUND / INVALID_PERSONA_ID),
      same pattern as `resolve()` at lines 384-394.


      Key details:

      - No validate/normalize needed -- registry specs are already canonical

      - Empty ids list returns `Success([])`

      - Fail-fast: first not-found id stops iteration and returns the error


      Pattern to follow: `list()` method for export_all, `resolve()` error mapping
      for export_ids.


      step_type: implementation'
    verification: '- `uv run invar guard` passes

      - `uv run python -c "from larva.app.facade import LarvaFacade, DefaultLarvaFacade;
      assert hasattr(DefaultLarvaFacade, ''export_all''); assert hasattr(DefaultLarvaFacade,
      ''export_ids'')"` succeeds

      - Export implementation lands only after upstream export contract and facade
      tests are in place'
