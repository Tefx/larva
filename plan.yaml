version: 1
project: larva
context: 'Meta-plan for larva planning and review work only: identify authoritative
  module boundaries, prepare planning rubric, create per-module implementation-planning
  tasks, review each module plan, then run a final cross-module review.'
phases:
- id: meta.discovery
  name: Discovery
  status: pending
  steps:
  - id: meta.discovery.authoritative_basis
    name: Confirm authoritative planning basis
    status: pending
    description: Verify the authoritative design/module-boundary documents for larva,
      extract the module inventory and dependency order, and record an explicit no-conflict
      conclusion before any module planning starts.
    verification: Evidence cites the exact sections that define module boundaries,
      interface responsibilities, and dependency order, and states whether any source
      conflict exists.
    evidence_template: '- Authoritative docs: <paths + sections>

      - Module inventory: <ordered list>

      - Dependency order: <ordered list>

      - Conflict check: <none | describe conflict>

      - Ready for downstream planning: <yes/no>'
    agent: doc-reviewer
- id: meta.prep
  name: Planning Prep
  status: locked
  depends_on:
  - meta.discovery
  steps:
  - id: meta.prep.planning_rubric
    name: Create module planning rubric
    status: pending
    description: Create the shared rubric that downstream module planners must follow
      when producing vectl plans, including required document citations, dependency
      handling, evidence expectations, and the rule that every produced step must
      name a concrete execution agent.
    verification: Rubric covers completeness, module boundary fidelity, dependency
      handling, evidence requirements, and explicit agent assignment for downstream
      steps.
    evidence_template: '- Rubric sections: <list>

      - Required citations: <list>

      - Required evidence for downstream planners: <list>

      - Agent assignment rule captured: <yes/no>'
    agent: doc-reviewer
  - id: meta.prep.review_checklist
    name: Define module-plan review checklist
    status: pending
    description: Define the checklist and acceptance gate for reviewing module-level
      plans, including boundary alignment, dependency correctness, sequencing, cross-module
      touchpoints, and evidence sufficiency.
    verification: Checklist is explicit enough for consistent per-module review and
      final cross-module review.
    evidence_template: '- Review checklist items: <list>

      - Boundary checks: <list>

      - Cross-module checks: <list>

      - Final-review gate: <list>'
    depends_on:
    - meta.prep.planning_rubric
    agent: software-architect
- id: meta.plan_creation
  name: Module Plan Creation
  status: locked
  depends_on:
  - meta.prep
  steps:
  - id: meta.plan.spec
    name: Plan module larva.core.spec
    status: pending
    description: Produce the detailed vectl implementation plan for `larva.core.spec`
      in `plan.yaml`, anchored to the authoritative docs. Downstream planner must
      use contract -> test -> implementation ordering for non-trivial new work, allow
      contract + implementation only under an explicit narrow simple-feature exception,
      keep contract steps acceptance-only, batch only within the `larva.core.spec`
      boundary, and assign a concrete execution agent to every produced step.
    verification: The produced module plan cites the authoritative docs, stays inside
      the `larva.core.spec` boundary, respects dependency direction, and names a concrete
      execution agent on every created step.
    evidence_template: '- Added step IDs: <list>

      - Boundary citations: <sections>

      - Downstream ordering used: <contract/test/implementation>

      - Concrete execution agents assigned: <yes/no>

      - Open module questions: <none | list>'
    agent: vectl-planner
- id: meta.review
  name: Review
  status: locked
  depends_on:
  - meta.plan_creation
