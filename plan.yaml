version: 1
project: larva
context: Meta-plan for per-module planning and review work derived from the repo's
  authoritative architecture and interface documents; excludes product implementation
  steps.
project_guidance: Planning/review work only. Use ARCHITECTURE.md as the authoritative
  module-boundary source and INTERFACES.md as the authoritative public-interface companion.
  Do not add code-implementation steps in this meta-plan.
phases:
- id: meta.prep
  name: Planning Prep
  status: locked
  depends_on:
  - meta.discovery
  steps:
  - id: meta.prep.define_rubric
    name: Define module plan rubric
    status: pending
    description: Create the rubric that every module-level plan must satisfy before
      review, including module scope, architecture refs, dependency coverage, evidence
      expectations, and an explicit ban on product implementation work in this meta-plan.
    verification: Rubric lists required plan sections, review checks, and evidence
      expectations for downstream module plan creation and review.
    evidence_template: '- rubric criteria

      - required refs/evidence

      - review checks'
    agent: doc-reviewer
  - id: meta.prep.sequence_planning
    name: Set module planning sequence
    status: pending
    description: Translate the architecture dependency graph into a planning sequence
      and concurrency policy for module-level plan creation and review, so downstream
      planners do not create cross-module plan churn.
    verification: A clear plan-order policy exists for foundation modules, orchestration
      modules, transport modules, and final synthesis review.
    evidence_template: '- planning order

      - allowed parallelism

      - dependency rationale'
    depends_on:
    - meta.prep.define_rubric
    agent: software-architect
- id: meta.discovery
  name: Discovery
  status: pending
  steps:
  - id: meta.discovery.confirm_basis
    name: Confirm authoritative planning basis
    status: pending
    description: Verify that `ARCHITECTURE.md` is the authoritative module-boundary
      source, confirm that `INTERFACES.md` aligns as the public-interface companion,
      and record any conflict that would block downstream planning work.
    verification: Document the authoritative source set, the extracted module inventory,
      and any blocking conflicts on module boundaries or dependency direction.
    evidence_template: '- authoritative docs used

      - module inventory extracted

