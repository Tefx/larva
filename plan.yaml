    - plan-foundations.core-spec-plan
    agent: vectl-planner
  - id: plan-foundations.core-validate-plan
    name: core-validate-plan
    status: pending
    description: 'Create the detailed vectl plan for module `larva.core.validate`
      using its architecture specification and the cross-module contract that places
      validation after assembly and before normalization checks are consumed.


      The module plan must stay in planning scope and capture its own future phase/step
      structure, verification expectations, and explicit interfaces with adjacent
      core modules.'
    verification: '- Detailed vectl plan exists for `larva.core.validate`

      - Plan captures architecture-defined interfaces and ordering assumptions

      - Plan excludes implementation tasks'
    evidence_template: '## Module Plan Evidence


      - Module: `larva.core.validate`

