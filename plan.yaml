      paths; if legacy inputs mention them, they must be rejected or stripped according
      to the authority basis rather than preserved into assembled candidates.

      Grep hint: search for `tools` and `side_effect_policy` handling in assemble/patch/admission
      helpers and candidate builders.

      IMPORTANT: search for siblings beyond the listed locations.


