      \   larva clear --confirm \"DELETE ALL PERSONAS\" [--json]\n   ```\n   - required\
      \ named arg: `--confirm` (string, required)\n   - optional: `--json` flag\n\n\
      \   Note: Use `required=True` on `--confirm` so argparse rejects missing confirm\
      \ before dispatch.\n\n### cli.py changes\n\n1. Add `delete_command(persona_id,\
      \ *, as_json, facade) -> Result[CliCommandResult, CliFailure]`:\n   - Delegate\
      \ to `facade.delete(persona_id)`\n   - On Success: stdout = rendered payload;\
      \ json = {\"data\": {\"id\": ..., \"deleted\": True}}; exit 0\n   - On Failure:\
