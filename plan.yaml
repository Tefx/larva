- id: baseline_failure_authority
  name: Baseline Failure Authority and Triage
  status: locked
  gate: Freeze authority for remaining baseline failures before code or test remediation.
  depends_on:
  - dup_deep_review
  steps:
  - id: baseline_failure_authority.behavior_matrix
    name: Capture failure matrix and baseline dispositions
    status: pending
    description: 'Run the known failing test clusters and produce a behavior matrix
      mapping each failure to one of: update_code, update_tests, or mixed. Group failures
      into these seams: core spec/schema/normalize drift, assemble output drift, facade
      sequencing drift, and CLI/MCP/python-api envelope drift. Record exact assertion
      deltas, authoritative source candidates, and whether the failure is clearly
      pre-existing versus newly exercised by duplicate-abstraction cleanup.


      Touch paths (read-only for this step): tests/core/test_spec.py, tests/core/test_schema_validation.py,
      tests/core/test_normalize.py, tests/core/test_assemble.py, tests/app/test_facade/**,
      tests/shell/test_cli.py, tests/shell/test_mcp.py, tests/shell/test_python_api.py.


      This is a local-check protecting downstream semantic remediation steps.'
    verification: 'Run the clustered failing tests and produce a matrix showing: failing
      assertion, current behavior, expected behavior, likely authority source, and
      proposed disposition (update_code/update_tests/mixed).'
    evidence_template: '## refs Read Confirmation (MANDATORY)

      For each ref in this step:

      - <filename> — key passage or "NOT READ: <reason>"


      ## Baseline Failure Matrix

      - Command(s) run:

      - Exact failing test ids:

      - For each failure cluster: current behavior, expected behavior, authority candidate,
      disposition

      - Explicit note whether the failure is pre-existing on clean baseline

      - Remaining ambiguity: none | <describe>'
    agent: integration-verifier-tacit
  - id: baseline_failure_authority.contract_decision
    name: Adjudicate canonical authority for remaining failure clusters
    status: pending
    description: 'Using the failure matrix, decide the authoritative semantics for:
      (1) canonical capabilities versus deprecated tools, (2) whether side_effect_policy
      remains rejected or transition-supported, (3) PersonaSpec required/optional
      field semantics, (4) assemble candidate output shape, and (5) transport envelope
      mapping for missing-id and related validation failures. Produce explicit decisions
      that downstream implementers must follow instead of guessing.


      This is the authority_adjudication step for the whole remediation stream.'
    verification: Produce a decision memo that assigns a disposition path for every
      failure cluster and explicitly resolves code-vs-test ambiguity for canonical
      contract, assembly output, facade sequencing, and transport envelopes.
    evidence_template: '## refs Read Confirmation (MANDATORY)

      For each ref in this step:

      - <filename> — key passage or "NOT READ: <reason>"


      ## Authority Decision Memo

      - Decision 1: capabilities vs tools

      - Decision 2: side_effect_policy handling

      - Decision 3: PersonaSpec required/optional semantics

      - Decision 4: assemble output contract

      - Decision 5: CLI/MCP/python-api envelope mapping

      - For each decision: chosen rule, rejected alternative, why

      - Disposition map: update_code | update_tests | mixed for each failure cluster'
    depends_on:
    - baseline_failure_authority.behavior_matrix
    agent: software-architect-tacit
  - id: baseline_failure_authority.gate
    name: Gate authority freeze for baseline failure remediation
    status: pending
    description: Gate review for the authority and baseline matrix phase. Block if
      any remaining failing cluster lacks an explicit authority owner, lacks a code-vs-test
      disposition, or would force downstream phases to guess canonical semantics.
    verification: Confirm every known baseline-failure cluster has an explicit authority
      decision and a downstream remediation path.
    evidence_template: '## refs Read Confirmation (MANDATORY)

      For each ref in this step:

      - <filename> — key passage or "NOT READ: <reason>"


      ## Gate Review Report

      - Step review: behavior_matrix, contract_decision

      - Missing authority decisions: none | <list>

      - Missing disposition paths: none | <list>

      - Gate decision: OPEN | BLOCKED'
