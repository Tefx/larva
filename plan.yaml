version: 1
project: larva
context: 'Meta-plan for planning and review work only. Goal: use authoritative design/module-boundary
  documents to create detailed module-level vectl implementation plans for every architecture
  module, review each module plan, then perform a final cross-module review. This
  plan does not include any production implementation steps.'
phases:
- id: meta.discovery
  name: Freeze Planning Basis
  status: pending
