  - id: feature_update.feature-update-core-apply-patches
    name: feature_update.core-apply-patches
    status: done
    description: "Implement pure patch application function in core layer.\n\nFile:\
      \ src/larva/core/patch.py (NEW FILE)\n\nThis is a non-simple feature path: it\
      \ introduces new core merge semantics with protected-field, precedence, and\
      \ dot-notation rules, so it MUST follow the upstream contract -> tests -> implementation\
      \ order.\n\nThis is a pure core function: no I/O, no side effects, deterministic.\
      \ It needs @pre/@post contracts and doctests per Invar rules.\n\n### Function\
      \ signature\n\n```python\n@pre(lambda spec, patches: isinstance(spec, dict)\
      \ and isinstance(patches, dict))\n@post(lambda result: isinstance(result, dict))\n\
      def apply_patches(spec: dict[str, object], patches: dict[str, object]) -> dict[str,\
      \ object]:\n```\n\n### Constants\n\n```python\nDEEP_MERGE_KEYS: frozenset[str]\
      \ = frozenset({\"model_params\", \"tools\"})\nPROTECTED_KEYS: frozenset[str]\
      \ = frozenset({\"spec_digest\", \"spec_version\"})\n```\n\n### Behavior\n\n\
      1. **Protected field exclusion**: Remove `spec_digest` and `spec_version` from\
      \ patches before applying. These are recomputed by normalize.\n\n2. **Dot-notation\
      \ expansion**: Expand dot-separated keys into nested dicts.\n   - `\"model_params.temperature\"\
      : 0.3` becomes `{\"model_params\": {\"temperature\": 0.3}}`\n   - Single-level\
      \ keys are unchanged\n\n3. **Merge strategy**:\n   - Top-level scalar keys:\
      \ last-writer-wins (patch overwrites spec)\n   - `model_params` (dict): deep\
      \ merge (patch keys merged into existing dict, not replaced)\n   - `tools` (dict):\
