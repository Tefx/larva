      - Root cause: canonical admission authority is still split across enforcement
      logic, assembly/normalize helpers, production-path contracts, and the larva-local
      schema.

      - Symptom: required-field behavior, forbidden-field rejection, schema authority,
      and production-path proof diverge even after the initial remediation phase.

      - Why this fix is not surface-level: this step must collapse the full admission
      path to the canonical authority basis instead of patching isolated call sites.


      ### B1: required-field mismatch vs authority basis

      Locations: canonical enforcement and all production admission consumers.

      Remediation: align canonical requiredness so `can_spawn` is required, `description`
      is optional, and `spec_version` is not elevated to requiredness unless the authority
      basis explicitly says so.

      Grep hint: search required-field sets and requiredness checks for `description`,
      `spec_version`, and `can_spawn` across core admission logic, facade admission
      logic, and schema artifacts.

      IMPORTANT: search for siblings beyond the listed locations.


