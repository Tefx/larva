      \   - Delegate to `facade.clear(confirm=confirm)`\n   - On Success: stdout =\
      \ rendered payload; json = {\"data\": {\"cleared\": True, \"count\": N}}; exit\
      \ 0\n   - On Failure: map via `_map_facade_error`; exit 1; stderr message if\
      \ not json\n\n3. Wire both into `_dispatch`:\n   ```python\n   if command ==\
