version: 1
project: larva
context: Implementation plan for larva.
phases:
- id: identify
  name: Identify Modules
  status: pending
  steps:
  - id: identify.module-inventory
    name: module-inventory
    status: pending
    description: 'Derive the authoritative larva module set from `ARCHITECTURE.md`,
      confirm the planning scope is planning/review only, and record the module ordering
      to be used for downstream per-module vectl plans.


      Architecture anchors:

      - `ARCHITECTURE.md` module specification sections for each module

      - `ARCHITECTURE.md` "Module Graph"

      - `ARCHITECTURE.md` "Suggested Build Order"


      Expected output:

      - canonical list of architecture modules to plan

      - module grouping rationale for later phases

      - explicit note that this meta-plan does not cover module implementation'
    verification: '- Output lists all architecture modules exactly once

      - Ordering is justified from `ARCHITECTURE.md`

      - Scope statement explicitly excludes implementation work'
    evidence_template: '## Module Inventory Evidence


      - Source architecture sections consulted

      - Final ordered module list

      - Grouping rationale

      - Planning-only scope note'
    agent: vectl-planner
  - id: identify.planning-rubric
    name: planning-rubric
    status: pending
    description: Define the standard rubric that every per-module detailed vectl plan
      must follow. The rubric must require concise module scope, module-specific phases/steps,
      dependency handling, verification expectations, and a follow-up review target
      while keeping the work strictly in planning territory.
    verification: '- Rubric defines what a valid per-module plan must contain

      - Rubric distinguishes planning tasks from implementation tasks

      - Rubric includes review expectations for each module plan'
    evidence_template: '## Planning Rubric Evidence


      - Required sections for each module plan

      - Required dependency and verification fields

      - Review checklist for module plan quality'
    depends_on:
    - identify.module-inventory
    agent: vectl-planner
  - id: identify.gate
    name: gate
    status: pending
    description: 'Gate review: confirm the module inventory and planning rubric are
      sufficient to begin per-module detailed planning and that the meta-plan is still
      scoped to planning/review only.


      review_depth: STANDARD'
    verification: '- Module inventory is complete and architecture-derived

      - Planning rubric is actionable for downstream module planning

      - No implementation scope has leaked into the meta-plan'
    evidence_template: '## Gate Review Report


      - Inventory completeness assessment

      - Rubric adequacy assessment

      - Scope control assessment

      - Go/no-go for per-module planning'
    depends_on:
    - identify.module-inventory
    - identify.planning-rubric
    agent: gate-reviewer
- id: plan-foundations
  name: Plan Foundation Modules
  status: pending
  steps:
  - id: plan-foundations.core-spec-plan
    name: core-spec-plan
    status: pending
    description: 'Create the detailed vectl plan for module `larva.core.spec` based
      on its architecture section and its role as the schema foundation for downstream
      modules.


      Plan content must stay in planning scope only and should include:

      - internal planning phases/steps needed for `larva.core.spec`

      - verification expectations for the future module plan

      - explicit downstream dependency notes for modules that rely on this plan

      - module-specific review target after planning completes'
    verification: '- Detailed vectl plan exists for `larva.core.spec`

      - Plan references the module''s responsibility, non-responsibility, and interface
      sections

      - Plan does not contain implementation work items'
    evidence_template: '## Module Plan Evidence


      - Module: `larva.core.spec`

      - Architecture sections used

      - Resulting plan structure

      - Planning-only scope confirmation'
    agent: vectl-planner
  - id: plan-foundations.core-normalize-plan
    name: core-normalize-plan
    status: pending
    description: 'Create the detailed vectl plan for module `larva.core.normalize`
      using its architecture specification and its placement immediately after `larva.core.spec`
      in the suggested module order.


      The resulting plan must stay planning-only and capture the module''s future
      planning steps, verification expectations, and dependencies on `larva.core.spec`
      and downstream consumers.'
    verification: '- Detailed vectl plan exists for `larva.core.normalize`

      - Plan captures architecture-defined responsibilities and dependencies

      - Plan stays limited to planning/review activities'
    evidence_template: '## Module Plan Evidence


      - Module: `larva.core.normalize`

      - Architecture sections used

      - Resulting plan structure

      - Planning-only scope confirmation'
