  name: 'Feature: Persona Batch Update (4-layer sync)'
  status: done
  steps:
  - id: feature_update_batch.facade-update-batch
    name: facade-update-batch
    status: done
    description: 'Implement the facade batch-update flow after the contract and focused
      tests are in place.


      step_type: implementation

      risk_level: high

      agent_source: upgraded_for_stateful_semantics


      File:

      - src/larva/app/facade.py


      Deliverables:

      - Complete `BatchUpdateItemResult` / `BatchUpdateResult` support in the facade
      surface.

      - Implement `LarvaFacade.update_batch(where, patches, dry_run=False)` in `DefaultLarvaFacade`.

      - Add a helper for dotted-key lookup that returns a unique not-found sentinel
      instead of throwing.


      Execution contract:

      1. Call `self._registry.list()` once to load registry specs; on failure, pass
      through the mapped facade error.

      2. Filter registry specs using AND semantics across all `where` clauses.

      3. Support dotted `where` keys via nested dict traversal; missing dotted keys
      are treated as non-matches.

      4. Preserve registry list order in the filtered result set.

      5. If `dry_run=True`, return `BatchUpdateResult(matched=<count>, updated=0,
      dry_run=True, results=[{"id": <matched-id>, "updated": False}, ...])` and perform
      no writes.

      6. If `dry_run=False`, iterate matched personas in order and delegate to `self.update(spec["id"],
      patches)`.

      7. Fail fast on the first delegated error; return that error immediately.

      8. Do not roll back personas already updated before the failure.

      9. On full success, return `BatchUpdateResult(matched=<count>, updated=<count>,
      dry_run=False, results=[{"id": <matched-id>, "updated": True}, ...])`.


      Failure-mode coverage that MUST be honored:

      - dot-path missing key behavior: non-match, not exception

      - where matching semantics: all clauses must match, no OR/coercion shortcuts

      - dry_run no-write guarantee: no registry save/update side effects

      - fail-fast partial-update semantics: earlier successes persist, later matches
      are not attempted after the first failure

      - error propagation: registry.list and delegated update/validation/save/get
      failures bubble with their mapped facade codes/details


      Pattern references:

      - Follow `list()` for registry.list error handling.

      - Follow `update()` for delegated per-persona patch/validate/normalize/save
      semantics.


      Out of scope:

      - No MCP, CLI, Python API, docs, or web changes in this step.'
