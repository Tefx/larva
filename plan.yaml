      - missing-file fallback when spec file exists but index entry is stale/missing

      - explicit empty/null digest rejection on save/index write path

      - stale-definition vs new-state precedence between spec file and `index.json`

      - partial-write / readable-consistency behavior for spec+index persistence


      State semantics:

      - Last-writer-wins applies to the latest valid persisted spec+digest pair, not
      to stale index metadata.

