      def clone(self, source_id: str, new_id: str) -> Result[PersonaSpec, LarvaError]:
      ...

      ```


      ## DefaultLarvaFacade Implementation

      Flow: `self._registry.get(source_id)` -> copy dict -> set `id = new_id` -> delete
      `spec_digest` -> `self.validate()` -> `self._normalize.normalize_spec()` ->
      `self._registry.save()` -> return normalized spec.


