      - Plan excludes product implementation work'
    evidence_template: '## Module Plan Evidence


      - Module: `larva.core.assemble`

      - Architecture sections used

      - Resulting plan structure

      - Planning-only scope confirmation'
    depends_on:
    - plan-foundations.core-validate-plan
    agent: vectl-planner
  - id: plan-foundations.gate
    name: gate
    status: pending
    description: 'Gate review: confirm the foundation-module planning set is complete,
      architecture-aligned, and still limited to planning/review activities.


      review_depth: STANDARD

      cross_cutting_focus:

      - build-order consistency across `larva.core.*`

      - planning-only scope control'
    verification: '- All four foundation module plans exist and are reviewable

      - Dependency assumptions are consistent across the foundation set

      - No implementation scope appears in the module plans'
    evidence_template: '## Gate Review Report


      - Coverage across foundation modules

      - Dependency consistency findings

      - Scope-control findings

      - Go/no-go for next planning phase'
    depends_on:
