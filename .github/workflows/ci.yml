name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-local-expected-red:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout larva
        uses: actions/checkout@v4

      - name: Read frozen opifex authority pin
        id: opifex-authority
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("design/opifex-frozen-authority-packet.json").read_text(encoding="utf-8"))
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"repository={payload['repository']}\n")
              handle.write(f"ref={payload['ref']}\n")
          PY

      - name: Checkout opifex authority
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.opifex-authority.outputs.repository }}
          ref: ${{ steps.opifex-authority.outputs.ref }}
          path: opifex
          token: ${{ secrets.OPIFEX_READ_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Seed expected-red drift
        run: uv run python scripts/ci/larva_repo_local_gate.py expected-red --opifex-root opifex

  repo-local-gate:
    runs-on: ubuntu-latest
    needs: repo-local-expected-red
    steps:
      - name: Checkout larva
        uses: actions/checkout@v4

      - name: Read frozen opifex authority pin
        id: opifex-authority
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("design/opifex-frozen-authority-packet.json").read_text(encoding="utf-8"))
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"repository={payload['repository']}\n")
              handle.write(f"ref={payload['ref']}\n")
          PY

      - name: Checkout opifex authority
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.opifex-authority.outputs.repository }}
          ref: ${{ steps.opifex-authority.outputs.ref }}
          path: opifex
          token: ${{ secrets.OPIFEX_READ_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Verify repo-local gate script tests
        run: uv run pytest -q tests/shell/test_repo_local_ci_gate.py

      - name: Verify shared-surface repo-local gate
        run: uv run python scripts/ci/larva_repo_local_gate.py verify --opifex-root opifex
